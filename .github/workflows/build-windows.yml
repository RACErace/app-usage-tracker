name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          "version=$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.version.outputs.version }}"
          $actualTag = "${{ github.ref_name }}"

          if ($actualTag -ne $expectedTag) {
            throw "Tag version mismatch. Expected $expectedTag but got $actualTag."
          }

      - name: Build Windows executables
        run: npx electron-builder --win nsis portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename build outputs
        id: artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $installer = Get-ChildItem dist -Filter *.exe | Where-Object { $_.Name -match 'Setup' } | Select-Object -First 1
          $portable = Get-ChildItem dist -Filter *.exe | Where-Object { $_.Name -notmatch 'Setup' } | Select-Object -First 1

          if (-not $installer) {
            throw 'Installer exe not found in dist directory.'
          }

          if (-not $portable) {
            throw 'Portable exe not found in dist directory.'
          }

          $installerTarget = "App-Usage-Tracker-$version-installer.exe"
          $portableTarget = "App-Usage-Tracker-$version-portable.exe"

          Rename-Item -Path $installer.FullName -NewName $installerTarget -Force
          Rename-Item -Path $portable.FullName -NewName $portableTarget -Force

          "installer_path=dist/$installerTarget" >> $env:GITHUB_OUTPUT
          "portable_path=dist/$portableTarget" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-usage-tracker-${{ steps.version.outputs.version }}-windows
          path: |
            ${{ steps.artifacts.outputs.installer_path }}
            ${{ steps.artifacts.outputs.portable_path }}
            dist/latest*.yml
            dist/builder-effective-config.yaml
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            ${{ steps.artifacts.outputs.installer_path }}
            ${{ steps.artifacts.outputs.portable_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
