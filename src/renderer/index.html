<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>使用统计</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button back-button inactive" type="button" id="back-button" aria-label="返回">‹</button>
        <div class="title-block">
          <h1 class="screen-title" id="screen-title"></h1>
        </div>
        <button class="text-button" type="button" id="settings-button">设置</button>
      </header>

      <main class="content-area">
        <section class="screen active" id="overview-screen">
          <div class="tab-row" id="range-tabs">
            <button class="range-tab active" type="button" data-range="daily">每天</button>
            <button class="range-tab" type="button" data-range="weekly">近 7 天</button>
          </div>

          <section class="date-strip">
            <button class="pill-button" type="button" id="previous-day">‹</button>
            <div class="date-label" id="date-label">今天</div>
            <button class="pill-button" type="button" id="next-day">›</button>
          </section>

          <div class="overview-grid">
            <section class="section-block chart-section">
              <div class="section-title-row">
                <h2 class="section-title" id="chart-section-title">使用时长（截至今天）</h2>
              </div>

              <article class="card chart-card">
                <div class="card-header">
                  <div>
                    <div class="big-metric" id="summary-duration">0 分钟</div>
                    <div class="sub-metric" id="summary-subtitle"></div>
                  </div>
                  <button class="icon-button info-button" type="button" id="refresh-button" aria-label="刷新">i</button>
                </div>

                <div class="chart-wrap">
                  <canvas id="usage-chart" width="340" height="240"></canvas>
                  <div class="chart-tooltip hidden" id="chart-tooltip"></div>
                </div>

                <div class="chart-legend" id="chart-legend">
                  <span class="legend-dot"></span>
                  <span class="legend-label">当前设备</span>
                </div>
              </article>
            </section>

            <section class="section-block ranking-section">
              <div class="section-title-row">
                <h2 class="section-title">使用排行</h2>
                <button class="text-button inline-button" type="button" id="category-button">显示类别</button>
              </div>

              <article class="card list-card">
                <div id="ranking-list" class="ranking-list"></div>
              </article>
            </section>

          </div>
        </section>

        <section class="screen" id="detail-screen">
          <section class="section-block detail-heading">
            <div class="detail-app-chip" id="detail-avatar"></div>
            <div>
              <h2 class="detail-title" id="detail-title">应用详情</h2>
              <p class="detail-subtitle" id="detail-subtitle"></p>
            </div>
          </section>

          <div class="detail-grid">
            <section class="section-block">
              <h2 class="section-title">使用时长（截至今天）</h2>
              <article class="card chart-card detail-card">
                <div class="card-header">
                  <div class="big-metric" id="detail-today-duration">0 分钟</div>
                </div>
                <div class="chart-wrap detail-chart-wrap">
                  <canvas id="detail-day-chart" width="340" height="220"></canvas>
                  <div class="chart-tooltip hidden" id="detail-day-tooltip"></div>
                </div>
              </article>
            </section>

            <section class="section-block">
              <h2 class="section-title">近 7 天使用时长</h2>
              <article class="card chart-card detail-card">
                <div class="card-header stacked">
                  <div class="big-metric" id="detail-week-average">0 分钟</div>
                  <div class="sub-metric" id="detail-week-total"></div>
                </div>
                <div class="chart-wrap detail-chart-wrap">
                  <canvas id="detail-week-chart" width="340" height="220"></canvas>
                  <div class="chart-tooltip hidden" id="detail-week-tooltip"></div>
                </div>
              </article>
            </section>

            <section class="section-block detail-meta-section">
              <article class="card metadata-card" id="detail-meta"></article>
            </section>
          </div>
        </section>

        <section class="screen" id="settings-screen">
          <section class="section-block settings-heading">
            <h2 class="section-title settings-title">设置</h2>
            <p class="settings-page-subtitle">应用级设置会与系统托盘菜单实时同步。</p>
          </section>

          <div class="settings-layout">
            <div class="settings-stack">
              <article class="card settings-panel">
                <button class="setting-row" type="button" id="auto-launch-toggle" aria-label="切换开机自启动">
                  <div class="setting-copy">
                    <span class="setting-name">开机自启动</span>
                    <span class="setting-text">登录 Windows 后自动启动应用，并默认常驻托盘。</span>
                  </div>
                  <span class="toggle-switch" id="auto-launch-switch" aria-hidden="true">
                    <span class="toggle-thumb"></span>
                  </span>
                </button>

                <div class="setting-status-line">
                  <span class="status-dot" id="auto-launch-dot"></span>
                  <span class="status-text" id="auto-launch-status">读取中</span>
                </div>
              </article>

              <article class="card settings-panel">
                <div class="section-title-row settings-section-header">
                  <div>
                    <h3 class="section-title">显示统计项</h3>
                    <p class="settings-description">只有勾选的项目会显示在排行与详情中，并参与总使用时长计算。</p>
                  </div>
                  <div class="settings-actions">
                    <button class="text-button inline-button" type="button" id="select-all-items-button">全选</button>
                    <button class="text-button inline-button" type="button" id="clear-all-items-button">清空</button>
                  </div>
                </div>

                <div class="setting-status-line selection-summary-line">
                  <span class="status-dot active"></span>
                  <span class="status-text" id="selected-items-summary">已选择 0 项</span>
                </div>

                <div class="setting-check-list" id="item-visibility-list"></div>
              </article>
            </div>

            <article class="bridge-card settings-help-card">
              <div>
                <h3>系统托盘说明</h3>
                <p>最小化和关闭窗口都会隐藏到托盘。右键托盘图标可以显示主窗口、切换开机自启动和退出程序。</p>
              </div>
            </article>

            <article class="bridge-card settings-help-card">
              <div>
                <h3>浏览器网页识别</h3>
                <p id="settings-bridge-url-text"></p>
              </div>
              <p class="bridge-hint">当前会把同一个根域名下的网页合并统计，例如不同的 bilibili 视频页都会记到 bilibili。</p>
            </article>
          </div>
        </section>
      </main>
    </div>

    <template id="ranking-item-template">
      <button class="ranking-item" type="button">
        <div class="app-avatar"></div>
        <div class="ranking-main">
          <div class="ranking-topline">
            <span class="ranking-name"></span>
            <span class="ranking-duration"></span>
          </div>
          <div class="progress-track">
            <div class="progress-bar"></div>
          </div>
          <div class="ranking-subtitle"></div>
        </div>
        <span class="chevron">›</span>
      </button>
    </template>

    <template id="setting-item-template">
      <label class="setting-check-item">
        <input class="setting-checkbox-input" type="checkbox" />
        <span class="setting-checkbox-mark" aria-hidden="true"></span>
        <span class="app-avatar setting-item-avatar"></span>
        <span class="setting-item-copy">
          <span class="setting-item-name"></span>
        </span>
      </label>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
